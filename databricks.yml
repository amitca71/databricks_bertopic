bundle:
  name: databricks_bertopic

include:
  - resources/*.yml

variables:
  source_catalog:
    default: amit
  source_schema:
    default: bertopic
  input_table_name:
    default: bertopic_input
  embedding_model:
    default: databricks-qwen3-embedding-0-6b
  model_result_table:
    default: topic_info_local
  instruct_model:
    default: databricks-meta-llama-3-3-70b-instruct
  vector_search_endpoint_name:
    default: bertopic_vector_search
  vector_search_endpoint_type:
    default: STANDARD
  vector_search_index_name:
    default: bertopic_input_index
  vector_search_pipeline_type:
    default: TRIGGERED
  vector_search_primary_key:
    default: id
  vector_search_embedding_source_column:
    default: text
  vector_search_columns_to_sync:
    default: id,text,translated,incitement_label,incitement_confidence,incitement_prob_incitement
  vector_search_sync_computed_embeddings:
    default: "false"
  vector_search_sync_index:
    default: "true"

targets:
  dev:
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
