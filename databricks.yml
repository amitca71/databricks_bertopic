bundle:
  name: databricks_bertopic

include:
  - resources/*.yml

variables:
  source_catalog:
    default: amit
  source_schema:
    default: bertopic
  input_table_name:
    default: bertopic_input
  embedding_model:
    default: databricks-qwen3-embedding-0-6b
  model_result_table:
    default: topic_info_local
  instruct_model:
    default: databricks-meta-llama-3.1-405b-instruct

targets:
  dev:
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
