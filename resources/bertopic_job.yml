resources:
  jobs:
    bertopic_pipeline:
      name: bertopic_pipeline
      tasks:
        - task_key: embedding
          notebook_task:
            notebook_path: ../embedding.ipynb
            base_parameters:
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              input_table_name: ${var.input_table_name}
              embedding_model: ${var.embedding_model}

        - task_key: bertopic
          depends_on:
            - task_key: embedding
          notebook_task:
            notebook_path: ../bertopic.ipynb
            base_parameters:
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              input_table_name: ${var.input_table_name}

        - task_key: topic_naming
          depends_on:
            - task_key: evaluation_refined_topics
          notebook_task:
            notebook_path: ../update_model_istruction.ipynb
            base_parameters:
              source_catalog: ${var.source_catalog}
              instruction_activity: topic_naming
              source_schema: ${var.source_schema}
              model_result_table: ${var.model_result_table}
              instruct_model: ${var.instruct_model}

        - task_key: evaluation
          depends_on:
            - task_key: bertopic
          notebook_task:
            notebook_path: ../update_model_istruction.ipynb
            base_parameters:
              source_catalog: ${var.source_catalog}
              instruction_activity: model_evaluation
              source_schema: ${var.source_schema}
              model_result_table: ${var.model_result_table}
              instruct_model: ${var.instruct_model}

        - task_key: enqueue_refinement_queue
          depends_on:
            - task_key: evaluation
          notebook_task:
            notebook_path: ../enqueue_refinement_queue.ipynb
            base_parameters:
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}

        - task_key: process_refinement_queue
          depends_on:
            - task_key: enqueue_refinement_queue
          notebook_task:
            notebook_path: ../process_refinement_queue.ipynb
            base_parameters:
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              input_table_name: ${var.input_table_name}

        - task_key: evaluation_refined_topics
          depends_on:
            - task_key: process_refinement_queue
          notebook_task:
            notebook_path: ../update_model_istruction.ipynb
            base_parameters:
              source_catalog: ${var.source_catalog}
              instruction_activity: model_evaluation
              source_schema: ${var.source_schema}
              model_result_table: ${var.model_result_table}
              instruct_model: ${var.instruct_model}

        - task_key: incitement
          notebook_task:
            notebook_path: ../incitement.ipynb
            base_parameters:
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              input_table_name: ${var.input_table_name}

        - task_key: vector_search_setup
          depends_on:
            - task_key: incitement
          notebook_task:
            notebook_path: ../vector_search_setup.py
            base_parameters:
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              input_table_name: ${var.input_table_name}
              vector_search_endpoint_name: ${var.vector_search_endpoint_name}
              vector_search_endpoint_type: ${var.vector_search_endpoint_type}
              vector_search_index_name: ${var.vector_search_index_name}
              vector_search_pipeline_type: ${var.vector_search_pipeline_type}
              vector_search_primary_key: ${var.vector_search_primary_key}
              vector_search_embedding_source_column: ${var.vector_search_embedding_source_column}
              vector_search_embedding_model_endpoint_name: ${var.embedding_model}
              vector_search_columns_to_sync: ${var.vector_search_columns_to_sync}
              vector_search_sync_computed_embeddings: ${var.vector_search_sync_computed_embeddings}
              vector_search_sync_index: ${var.vector_search_sync_index}
